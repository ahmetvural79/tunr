# .goreleaser.yaml
# Produce binaries for all platforms using goreleaser with a single command.
# Solve the "it works on my machine" problem at the binary level.

version: 2

project_name: tunr

before:
  hooks:
    # Check dependencies before every build
    - go mod tidy
    - go mod verify  # VERIFY: ensure modules match expected checksums
    # SECURITY: important against supply chain attacks

builds:
  - id: tunr
    main: ./cmd/tunr
    binary: tunr
    
    # Inject version at build time
    ldflags:
      - -s -w  # shrink binary (remove debug symbols)
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}
      - -X main.Commit={{.Commit}}
    
    # CGO disabled = no system dependencies = "works everywhere"
    env:
      - CGO_ENABLED=0
    
    # All target platforms
    goos:
      - linux
      - windows
      - darwin
    
    goarch:
      - amd64
      - arm64
      - "386"  # for 32-bit Linux (CI servers can sometimes be old)
    
    # Skip unsupported combinations
    ignore:
      - goos: windows
        goarch: arm64  # Will look into Windows ARM64 later
      - goos: darwin
        goarch: "386"  # macOS 32-bit died in 2010

  # Relay: ayrı Go modülü (relay/go.mod) — dir ile relay/ dizininden build ediyoruz
  - id: tunr-relay
    dir: relay
    main: ./cmd/server
    binary: tunr-relay
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: tunr
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    
    format_overrides:
      - goos: windows
        formats: [zip]  # Windows users want zip; "format" deprecated in GoReleaser v2
    
    # Extra files for human readability
    files:
      - README.md
      - LICENSE
      - SECURITY.md

  - id: tunr-relay
    name_template: >-
      tunr-relay_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}amd64{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"
  algorithm: sha256
  # SECURITY: SHA256 hash of every binary
  # users can verify "did I really download this file?"

signs:
  - artifacts: checksum
    # TODO: GPG signing to be added in Phase 1
    # Sigstore signing with cosign is planned

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore:"      # dependency updates shouldn't pollute the changelog
      - "^docs:"       # documentation changes are separate
      - "^test:"       # test changes are separate
      - Merge pull request
      - Merge branch

release:
  github:
    owner: ahmetvural79
    name: tunr
  
  # Create as Draft, confirm manually
  # (publishing the wrong version is embarrassing)
  draft: true
  
  name_template: "tunr v{{.Version}}"
  
  footer: |
    ## How to Install?
    
    ```bash
    # macOS (Homebrew)
    brew install ahmetvural79/tap/tunr
    
    # Linux / macOS (curl)
    curl -fsSL https://tunr.sh/install | sh
    
    # npm (For Node.js projects)
    npx tunr@latest share --port 3000
    ```
    
    For more: https://tunr.sh/docs

# GoReleaser v2: brews deprecated in favor of homebrew_casks (since v2.10)
homebrew_casks:
  - name: tunr
    ids:
      - tunr
    description: "local → public tunnel tool for Vibecoders"
    homepage: "https://tunr.sh"
    repository:
      owner: ahmetvural79
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    skip_upload: "{{ eq .Env.HOMEBREW_TAP_TOKEN \"\" }}"
    url:
      verified: "github.com/ahmetvural79/tunr"
    # Unsigned binary: remove quarantine so macOS allows running
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tunr"]
          end

