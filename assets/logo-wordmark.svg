<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 160" fill="none">
  <defs>
    <linearGradient id="wm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (compact) -->
  <rect x="8" y="8" width="144" height="144" rx="32" fill="url(#wm-bg)"/>

  <!-- Tunnel rings -->
  <ellipse cx="80" cy="80" rx="52" ry="52" fill="none" stroke="white" stroke-width="1.5" opacity="0.12"/>
  <ellipse cx="80" cy="80" rx="36" ry="36" fill="none" stroke="white" stroke-width="1" opacity="0.10"/>

  <!-- T letterform -->
  <g transform="translate(80, 78)">
    <rect x="-32" y="-28" width="64" height="14" rx="3" fill="white"/>
    <rect x="-8" y="-28" width="16" height="68" rx="3" fill="white"/>
  </g>

  <!-- Forward arrow -->
  <path d="M116 116 L132 132 L116 148" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <line x1="104" y1="132" x2="130" y2="132" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Wordmark text -->
  <text x="184" y="112" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-size="84" font-weight="700" letter-spacing="-3" fill="#ffffff">tunr</text>

  <!-- .sh hint -->
  <text x="453" y="112" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="32" font-weight="400" fill="#a855f7" opacity="0.65">.sh</text>
</svg>
