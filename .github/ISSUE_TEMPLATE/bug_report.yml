name: Bug report
description: Report a reproducible bug in tunr CLI or docs.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail so we can reproduce quickly.
  - type: input
    id: version
    attributes:
      label: tunr version
      description: Output of `tunr version`
      placeholder: v0.0.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Clear summary of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and expected vs actual result.
      placeholder: |
        1. Run `tunr share --port 3000`
        2. Open the generated URL
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      description: Paste terminal output or error messages (redact secrets).
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one.
          required: true
        - label: I removed any sensitive tokens/secrets from logs.
          required: true
