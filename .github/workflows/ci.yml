name: CI

# Her PR ve main push'ta çalışır.
# "Çalışıyordu bende" diyen PR'lar için CI var.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Aynı branch'e hızlı push yapınca önceki CI'ı iptal et
# (kaynak israfı önleme - fatura önemli)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────
  # Lint - "Bu kodu okuyabiliyor musun?" testi
  # ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Go kurulum
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true  # modülleri cache'le, zamandan kazan

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  # ────────────────────────────────────────────
  # Test - "Gerçekten çalışıyor mu?" testi
  # ────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # bir platform bozulunca diğerini de öldürme
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Go kurulum
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Bağımlılıkları indir
        run: go mod download

      - name: Build testi (derleniyor mu?)
        run: go build ./...

      - name: Unit testler
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        # -race: race condition'ları yakala (biraz yavaş ama değer)

      - name: Coverage badge güncelle (sadece main'de)
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          fail_ci_if_error: false  # coverage upload failuresi CI'ı bloklamamalı

  # ────────────────────────────────────────────
  # Security - "Güvenlik açığı var mı?" testi
  # Bu açık kaynak proje için çok önemli!
  # ────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Go kurulum
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: govulncheck - Go vulnerability scanner
        # Google'ın resmi vuln scanner'ı - dependency CVE'lerini yakalar
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: go vet - statik analiz
        run: go vet ./...

  # ────────────────────────────────────────────
  # Build check - Tüm platformlar için build
  # ────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Go kurulum
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Cross-platform build
        env:
          CGO_ENABLED: "0"  # statik binary için
        run: |
          GOOS=linux   GOARCH=amd64  go build -o dist/tunr-linux-amd64   ./cmd/tunr
          GOOS=linux   GOARCH=arm64  go build -o dist/tunr-linux-arm64   ./cmd/tunr
          GOOS=darwin  GOARCH=amd64  go build -o dist/tunr-darwin-amd64  ./cmd/tunr
          GOOS=darwin  GOARCH=arm64  go build -o dist/tunr-darwin-arm64  ./cmd/tunr
          GOOS=windows GOARCH=amd64  go build -o dist/tunr-windows-amd64.exe ./cmd/tunr

      - name: Binary boyutlarını göster (merak ediyoruz)
        run: ls -lh dist/

      - name: Build artifact olarak yükle
        uses: actions/upload-artifact@v7
        with:
          name: tunr-binaries-${{ github.sha }}
          path: dist/
          retention-days: 7  # 7 gün sonra silinsin, yer dolmasın
