name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Verify & Test
        run: |
          go mod verify
          go test ./...
          cd relay && go mod verify && go test ./... && cd ..

      - name: Security check (non-blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tail -30
          (cd relay && govulncheck ./...) 2>&1 | tail -20
        continue-on-error: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: goreleaser ile release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.14.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Homebrew tap için ayrı token (farklı repo'ya write erişimi)
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          COSIGN_EXPERIMENTAL: "1"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/**"
